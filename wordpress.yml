---
- name: Running WordPress Playbook
  hosts: wordpress
  vars_files:
    - variables/main.yml
  tasks:
    - name: Install dependacies for WordPress
      become: true
      ansible.builtin.apt:
        name:
          - ghostscript
          - libapache2-mod-php
          - php
          - php-bcmath
          - php-curl
          - php-imagick
          - php-intl
          - php-json
          - php-mbstring
          - php-mysql
          - php-xml
          - php-zip
          - tar
          - python3-pymysql

    - name: Download WordPress
      become: true
      ansible.builtin.get_url:
        url: https://wordpress.org/latest.tar.gz
        dest: /tmp
        mode: "0655"
        force: true

    - name: Extract WordPress files
      become: true
      ansible.builtin.unarchive:
        remote_src: true
        src: /tmp/latest.tar.gz
        dest: /var/www
        owner: www-data
        group: www-data

    - name: Create WordPress database
      become: true
      community.mysql.mysql_db:
        name: "{{ wordpress.database.name }}"
        state: present
        login_user: "{{ mysql.username }}"
        login_password: "{{ mysql.password }}"
        login_host: "{{ mysql.address }}"
        login_port: "{{ mysql.port }}"

    - name: Create WordPress users
      become: true
      community.mysql.mysql_user:
        login_user: "{{ mysql.username }}"
        login_password: "{{ mysql.password }}"
        login_host: "{{ mysql.address }}"
        login_port: "{{ mysql.port }}"
        column_case_sensitive: true
        name: "{{ wordpress.database.user }}"
        password: "{{ wordpress.database.password }}"
        host: "%"
        priv:
          "{{ wordpress.database.name }}.*:ALL"
        state: present

    - name: SSL certificate request generator
      ansible.builtin.include_tasks: tasks/adding-ssl-cert.yml

    - name: Enable apache mods for https
      become: true
      community.general.apache2_module:
        state: present
        name: "{{ item }}"
      notify: Restart Apache2
      loop:
        - ssl
        - rewrite
        - headers
        - env
        - dir
        - mime

    - name: Add WordPress Apache2 config
      become: true
      ansible.builtin.copy:
        content: |
          <VirtualHost *:80>
            DocumentRoot /var/www/wordpress

            ServerName {{ domain_name }}

            <Directory /var/www/wordpress>
                Options FollowSymLinks
                AllowOverride Limit Options FileInfo
                DirectoryIndex index.php
                Require all granted
            </Directory>

            <Directory /var/www/wordpress/wp-content>
                Options FollowSymLinks
                Require all granted
            </Directory>
          </VirtualHost>

          <VirtualHost *:443>
              DocumentRoot /var/www/wordpress
              ServerName {{ domain_name }}

              SSLEngine on
              SSLCertificateFile /etc/ssl/certs/{{ certificate.public_key }}
              SSLCertificateKeyFile /etc/ssl/private/{{ certificate.private_key }}

              <Directory /var/www/wordpress>
                  Options FollowSymLinks
                  AllowOverride Limit Options FileInfo
                  DirectoryIndex index.php
                  Require all granted
              </Directory>

              <Directory /var/www/wordpress/wp-content>
                  Options FollowSymLinks
                  Require all granted
              </Directory>
          </VirtualHost>
        dest: /etc/apache2/sites-enabled/wordpress.conf
        owner: root
        group: root
        mode: "0644"
      notify: Restart Apache2

    - name: Disable default Apache site
      become: true
      ansible.builtin.file:
        path: /etc/apache2/sites-enabled/000-default.conf
        state: absent
      notify: Restart Apache2

    - name: Add WordPress config
      become: true
      ansible.builtin.file:
        state: touch
        path: /var/www/wordpress/wp-config.php
        owner: www-data
        group: www-data
        mode: "0640"

    - name: Configure WordPress config
      become: true
      ansible.builtin.copy:
        content: |
          <?php
          /** The name of the database for WordPress */
          define( 'DB_NAME', '{{ wordpress.database.name }}' );

          /** Database username */
          define( 'DB_USER', '{{ wordpress.database.user }}' );

          /** Database password */
          define( 'DB_PASSWORD', '{{ wordpress.database.password }}' );

          /** Database hostname */
          define( 'DB_HOST', '{{ wordpress.database.host }}:{{ wordpress.database.port }}' );

          /** Database charset to use in creating database tables. */
          define( 'DB_CHARSET', 'utf8mb4' );

          /** The database collate type. Don't change this if in doubt. */
          define( 'DB_COLLATE', '' );

          /** https://api.wordpress.org/secret-key/1.1/salt/ */
          define( 'AUTH_KEY', '{{ wordpress.auth_key }}' );
          define( 'SECURE_AUTH_KEY', '{{ wordpress.secure_auth_key }}' );
          define( 'LOGGED_IN_KEY', '{{ wordpress.logged_in_key }}' );
          define( 'NONCE_KEY', '{{ wordpress.nonce_key }}' );
          define( 'AUTH_SALT', '{{ wordpress.auth_salt }}' );
          define( 'SECURE_AUTH_SALT', '{{ wordpress.secure_auth_salt }}' );
          define( 'LOGGED_IN_SALT', '{{ wordpress.logged_in_salt }}' );
          define( 'NONCE_SALT', '{{ wordpress.nonce_salt }}' );

          $table_prefix = 'wp_';
          define( 'WP_DEBUG', true );

          /* Add any custom values between this line and the "stop editing" line. */

          /* Multisite */
          define( 'WP_ALLOW_MULTISITE', true );

          define( 'MULTISITE', true );
          define( 'SUBDOMAIN_INSTALL', false );
          define( 'DOMAIN_CURRENT_SITE', '{{ domain_name }}' );
          define( 'PATH_CURRENT_SITE', '/' );
          define( 'SITE_ID_CURRENT_SITE', 1 );
          define( 'BLOG_ID_CURRENT_SITE', 1 );


          /* That's all, stop editing! Happy publishing. */

          /** Absolute path to the WordPress directory. */
          if ( ! defined( 'ABSPATH' ) ) {
                  define( 'ABSPATH', __DIR__ . '/' );
          }

          /** Sets up WordPress vars and included files. */
          require_once ABSPATH . 'wp-settings.php';
        dest: /var/www/wordpress/wp-config.php
        owner: www-data
        group: www-data
        mode: "0644"

    - name: Configure Apache2 .htaccess file
      become: true
      ansible.builtin.copy:
        content: |
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]
            RewriteBase /
            RewriteRule ^index\.php$ - [L]

            # add a trailing slash to /wp-admin
            RewriteRule ^([_0-9a-zA-Z-]+/)?wp-admin$ $1wp-admin/ [R=301,L]

            RewriteCond %{REQUEST_FILENAME} -f [OR]
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^ - [L]
            RewriteRule ^([_0-9a-zA-Z-]+/)?(wp-(content|admin|includes).*) $2 [L]
            RewriteRule ^([_0-9a-zA-Z-]+/)?(.*\.php)$ $2 [L]
            RewriteRule . index.php [L]
          </IfModule>
        dest: /var/www/wordpress/.htaccess
        owner: www-data
        group: www-data
        mode: "0644"

  handlers:
    - name: Restart Apache2
      become: true
      ansible.builtin.service:
        name: apache2
        state: restarted
