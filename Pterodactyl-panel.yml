---
- name: Installing pterodactyl panel
  hosts: pterodactyl-panel
  vars_files:
    - variables/pterodactyl_panel.yml
    - variables/ssl-default-values.yml
  tasks:
    - name: Installing php and dependency
      become: true
      ansible.builtin.apt:
        name:
          - software-properties-common
          - curl
          - apt-transport-https
          - ca-certificates
          - gnupg

    - name: Installing php and dependency
      # - and fpm if you are planning to use NGINX.
      become: true
      ansible.builtin.apt:
        name:
          - php
          - php-cli
          - php-gd
          - php-mysql
          - php-mbstring
          - php-tokenizer
          - php-bcmath
          - php-xml
          - php-dom
          - php-curl
          - php-zip
          - openssl
          - curl
          - tar
          - unzip
          - git
          - mysql-client


    - name: Download Composer installer
      ansible.builtin.get_url:
        url: https://getcomposer.org/installer
        dest: /tmp/composer-setup.php
        mode: '0755'

    - name: Installing Composer
      become: true
      ansible.builtin.command:
        cmd: php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer
        creates: /usr/local/bin/composer

    - name: Remove Composer installer
      ansible.builtin.file:
        path: /tmp/composer-setup.php
        state: absent

    - name: Creating pterodactyl direcoty
      become: true
      ansible.builtin.file:
        state: directory
        path: /var/www/pterodactyl
        owner: www-data
        group: www-data

        recurse: true

    - name: Downloading pterodactyl
      become: true
      ansible.builtin.get_url:
        url: https://github.com/pterodactyl/panel/releases/latest/download/panel.tar.gz
        dest: /tmp
        mode: "0655"
        force: true

    - name: Extracting file
      become: true
      ansible.builtin.unarchive:
        remote_src: true
        src: /tmp/panel.tar.gz
        dest: /var/www/pterodactyl
        owner: www-data
        group: www-data


    - name: Chaning permissions
      ansible.builtin.file:
        path: "/var/www/pterodactyl/{{ item }}"
        mode: "0755"
        owner: www-data
        group: www-data
      loop:
        - bootstrap/cache/
        - storage/


    - name: Alter
      become: true
      ansible.builtin.replace:
        path: /var/www/pterodactyl/resources/scripts/components/server/console/ServerDetailsBlock.tsx
        regexp: ':\$\{match\.port\}'
        replace: ''


    - name: Creating .env file
      become: true
      ansible.builtin.copy:
        remote_src: true
        src: /var/www/pterodactyl/.env.example
        dest: /var/www/pterodactyl/.env
        owner: www-data
        group: www-data
        mode: "0644"

    - name: Configring env file
      become: true
      ansible.builtin.lineinfile:
        path: /var/www/pterodactyl/.env
        regexp: "{{ item.option }}"
        line: "{{ item.option }}={{ item.value }}"
      loop:
        - { option: APP_ENV, value: "{{ app_env }}" }
        - { option: APP_DEBUG, value: "{{ app_debug }}" }
        - { option: APP_KEY, value: "{{ app_key }}" }
        - { option: APP_THEME, value: "{{ app_theme }}" }
        - { option: APP_TIMEZONE, value: "{{ app_timezone }}" }
        - { option: APP_URL, value: "{{ app_url }}" }
        - { option: APP_LOCALE, value: "{{ app_locale }}" }
        - { option: APP_ENVIRONMENT_ONLY, value: "false" }

        - { option: DB_CONNECTION, value: "{{ db_type }}" }
        - { option: DB_HOST, value: "{{ db_host }}" }
        - { option: DB_PORT, value: "{{ db_port }}" }
        - { option: DB_DATABASE, value: "{{ db_database }}" }
        - { option: DB_USERNAME, value: "{{ db_user }}" }
        - { option: DB_PASSWORD, value: "{{ db_password }}" }

        - { option: REDIS_HOST, value: "{{ redis_host }}" }
        - { option: REDIS_PORT, value: "{{ redis_port }}" }
        - { option: REDIS_PASSWORD, value: "{{ redis_password }}" }


    # php artisan p:environment:mail

    - name: Install required packages
      become: true
      ansible.builtin.apt:
        name:
          - curl
          - gpg
        state: present
        update_cache: true

    - name: Installing redig keys
      become: true
      ansible.builtin.shell: |
        curl -fsSL https://packages.redis.io/gpg | sudo gpg --dearmor -o /usr/share/keyrings/redis-archive-keyring.gpg
        sudo chmod 644 /usr/share/keyrings/redis-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/redis-archive-keyring.gpg

    - name: Add Redis APT repository
      become: true
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/redis-archive-keyring.gpg] https://packages.redis.io/deb {{ ansible_distribution_release }} main"
        filename: redis
        update_cache: true

    - name: Install Redis
      become: true
      ansible.builtin.apt:
        name: redis
        state: present

    - name: Configring env file
      become: true
      ansible.builtin.lineinfile:
        path: /etc/redis/redis.conf
        regexp: "^{{ item.option }}.*"
        line: "{{ item.option }} {{ item.value }}"
      loop:
        - { option: bind, value: "{{ redis_host }}" }
        - { option: port, value: "{{ redis_port }}" }
        - { option: requirepass, value: "{{ redis_password }}" }

    - name: Enabling redis
      become: true
      ansible.builtin.service:
        name: redis-server
        state: restarted
        enabled: true

    - name: Install pacakge of composer
      ansible.builtin.command: sudo -u www-data composer install --no-dev --optimize-autoloader
      args:
        chdir: "/var/www/pterodactyl"

    - name: Migrating
      ansible.builtin.command: sudo -u www-data php artisan migrate --seed --force
      args:
        chdir: "/var/www/pterodactyl"

    - name: Adding systemd config
      become: true
      ansible.builtin.copy:
        content: |
          # Pterodactyl Queue Worker File
          # ----------------------------------

          [Unit]
          Description=Pterodactyl Queue Worker
          After=redis-server.service

          [Service]
          # On some systems the user and group might be different.
          # Some systems use `apache` or `nginx` as the user and group.
          User=www-data
          Group=www-data
          Restart=always
          ExecStart=/usr/bin/php /var/www/pterodactyl/artisan queue:work --queue=high,standard,low --sleep=3 --tries=3
          StartLimitInterval=180
          StartLimitBurst=30
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/pteroq.service
        owner: root
        group: root
        mode: '0755'


    - name: Installing ssl cert for https connection
      ansible.builtin.include_tasks: tasks/adding-ssl-cert.yml
      vars:
        subject_alt_name_options:
          - "DNS:{{ domain_name }}"
          - "IP:{{ ip_address }}"


    - name: Installing apache
      become: true
      ansible.builtin.apt:
        name:
          apache2

    - name: Adding apache config
      become: true
      ansible.builtin.copy:
        content: |
          <VirtualHost *:80>
            RewriteEngine On
            RewriteCond %{HTTPS} !=on
            RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R,L]
          </VirtualHost>

          <VirtualHost *:443>
              DocumentRoot "/var/www/pterodactyl/public"

              AllowEncodedSlashes On

              php_value upload_max_filesize 100M
              php_value post_max_size 100M

              <Directory "/var/www/pterodactyl/public">
                  Require all granted
                  AllowOverride all
              </Directory>

              SSLEngine on
              SSLCertificateFile /etc/ssl/certs/{{ PublicKey }}
              SSLCertificateKeyFile /etc/ssl/private/{{ PrivateKey }}
          </VirtualHost>
        dest: /etc/apache2/sites-available/pterodactyl.conf
        owner: root
        group: root
        mode: '0644'

    - name: Disable default Apache site
      become: true
      ansible.builtin.command: a2dissite 000-default.conf
      args:
        removes: /etc/apache2/sites-enabled/000-default.conf

    - name: Enable Apache site
      become: true
      ansible.builtin.command: a2ensite pterodactyl.conf
      args:
        creates: /etc/apache2/sites-enabled/pterodactyl.conf

    - name: Enabling apache mods
      become: true
      ansible.builtin.command: a2enmod ssl rewrite headers env dir mime

    - name: Restart apache
      become: true
      ansible.builtin.service:
        name: apache2
        state: restarted

    - name: Installing NodeJS
      ansible.builtin.include_tasks: tasks/nodejs-install.yml

    - name: Install Yarn globally using npm
      become: true
      community.general.npm:
        name: yarn
        global: true
        state: present

    - name: Install project dependencies
      ansible.builtin.command: sudo -u www-data yarn "{{ item }}"
      args:
        chdir: "/var/www/pterodactyl"
      loop:
        - install
        - build
