---
- name: Running Nginx Reverse Proxy Playbook
  hosts: nginx
  vars_files:
    - variables/config/nginx-reverse.yml
    - variables/system/certificate.yml
  tasks:
    - name: Installing nginx
      become: true
      ansible.builtin.apt:
        name:
          - nginx
          - python3-cryptography

    - name: Enabling nginx
      become: true
      ansible.builtin.systemd_service:
        name: nginx
        state: started
        enabled: true

    - name: Adding site configuration
      ansible.builtin.include_tasks: tasks/nginx-reverse.yml
      loop: "{{ sites }}"

  handlers:
    - name: Restart nginx
      become: true
      ansible.builtin.systemd_service:
        name: nginx
        state: restarted
