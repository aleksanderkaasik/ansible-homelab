---
- name: Running Nginx Reverse Proxy Playbook
  hosts: nginx
  vars_files:
    - variables/config/nginx-reverse.yml
    - variables/system/certificate.yml
  tasks:
    - name: Installing nginx
      become: true
      ansible.builtin.apt:
        name:
          - nginx
          - jq
          - python3-cryptography

    - name: Enabling nginx
      become: true
      ansible.builtin.systemd_service:
        name: nginx
        state: started
        enabled: true

    - name: Cloning Script Git repo
      become: true
      ansible.builtin.git:
        repo: https://github.com/aleksanderkaasik/CloudFlare-Origin-SSL-checker.git
        dest: /var/CloudFlare-Origin-SSL-checker
        version: main
        update: true
        force: true

    - name: Adding Cloudflare api
      become: true
      ansible.builtin.lineinfile:
        dest: /var/CloudFlare-Origin-SSL-checker/script.sh
        regexp: '^cloudflareApiToken'
        line: "cloudflareApiToken=\"{{ cloudflare.api_token }}\""
        owner: ansible
        group: ansible
        mode: '0755'

    - name: Change zone config file
      become: true
      ansible.builtin.copy:
        content: |
          {
            {% for zone in cloudflare.zones | dict2items %}
            "{{ zone.key }}": {
            "id": "{{ zone.value.id }}",
            "sub-domains": [{% for site in zone.value.sites %}"{{ site.sub }}"{% if not loop.last %},{% endif %}{% endfor %}]
            }{% if not loop.last %},{% endif %}
            {% endfor %}
          }
        dest: /var/CloudFlare-Origin-SSL-checker/zoneConfig.json
        owner: ansible
        group: ansible
        mode: "0755"
      notify: Execute script

    - name: Creates a cronjob
      ansible.builtin.cron:
        name: Renewel Certs
        minute: "0"
        hour: "*/6"
        day: "*"
        month: "*"
        weekday: "*"
        job: "sudo bash /var/CloudFlare-Origin-SSL-checker/script.sh"

    - name: Deploy nginx config
      become: true
      ansible.builtin.copy:
        content: |
          server {
            listen 80;
            server_name {{ item.1.sub }}.{{ item.0.key }};
            return 301 https://$server_name$request_uri;
          }

          server {
            listen 443 ssl http2;
            server_name {{ item.1.sub }}.{{ item.0.key }};

            ssl_certificate /etc/ssl/certs/{{ item.1.sub }}.{{ item.0.key }}.pem;
            ssl_certificate_key /etc/ssl/private/{{ item.1.sub }}.{{ item.0.key }}.key;

            location / {
                proxy_pass {{ item.1.proxy }};
                include proxy_params;
            }
          }
        dest: "/etc/nginx/sites-enabled/{{ item.1.sub }}.{{ item.0.key }}.conf"
        owner: root
        group: root
        mode: "0644"
      notify: Restart nginx
      loop: "{{ query('subelements', cloudflare.zones | dict2items, 'value.sites') }}"

  handlers:
    - name: Execute script
      become: true
      ansible.builtin.command: "/var/CloudFlare-Origin-SSL-checker/script.sh"
      notify: Restart nginx

    - name: Restart nginx
      become: true
      ansible.builtin.systemd_service:
        name: nginx
        state: restarted
