---
- name: Running LXC setup Playbook
  hosts: all
  vars_files:
    - variables/system/user.yml
  tasks:
    - name: Update caches
      become: true
      ansible.builtin.apt:
        update_cache: true

    - name: Upgrade packages
      become: true
      ansible.builtin.apt:
        only_upgrade: true

    - name: Upgrade the OS
      become: true
      ansible.builtin.apt:
        upgrade: dist

    - name: Reboot system
      become: true
      ansible.builtin.reboot:

    - name: Create group
      ansible.builtin.group:
        name: "{{ item }}"
      loop:
        - "{{ admin.group }}"
        - "{{ ansible.group }}"

    - name: Create user for admin use
      become: true
      ansible.builtin.user:
        name: "{{ admin.user }}"
        password: "{{ admin.password | password_hash('sha512') }}"
        shell: /bin/bash
        group: "{{ admin.group }}"
        groups:
          - sudo

    - name: Add SSH key for admin user
      become: true
      ansible.posix.authorized_key:
        user: "{{ admin.user }}"
        key: "{{ admin.key }}"

    - name: Create user for ansible user
      become: true
      ansible.builtin.user:
        name: "{{ ansible.user }}"
        group: "{{ ansible.group }}"
        groups:
          - sudo


    - name: Add SSH key for ansible user
      become: true
      ansible.posix.authorized_key:
        user: "{{ ansible.user }}"
        key: "{{ ansible.key }}"

    - name: Add sudoers file for user
      become: true
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ ansible.user }}"
        content: "{{ ansible.user }} ALL=(ALL) NOPASSWD:ALL"
        owner: root
        group: root
        mode: "0440"

    - name: Remove SSH key from the root
      become: true
      ansible.posix.authorized_key:
        user: root
        key: "{{ root.key }}"
        state: absent

    - name: Install needed packages
      become: true
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - git
          - tmux
